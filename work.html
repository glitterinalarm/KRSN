<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Works — PARAFFINE</title>
<meta name="description" content="Selected works by PARAFFINE — Creative Direction & Motion augmented by AI."/>
<link href="monolith.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fff;
  color: #000;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: none;
}

/* NAV */
.nav-split { color: #000; }
.nav-split a { color: #000; text-decoration: none; transition: opacity 0.3s; }
.nav-split a:hover { opacity: 0.45; }
.nav-logo-center { color: #000; }

/* SCENE */
#works-scene {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* CARD — base, positioning set by JS */
.work-card {
  position: absolute;
  overflow: hidden;
  background: #e8e8e8;
  will-change: left, top, width, height;
  cursor: none;
}

/* SLIDES */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.9s ease;
}
.slide.active { opacity: 1; }
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* HOVER OVERLAY — default: gradient + title at bottom */
.card-overlay {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 1.4rem 1.6rem;
  background: linear-gradient(transparent 45%, rgba(0,0,0,0.7) 100%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.work-card:hover .card-overlay,
.work-card.touched .card-overlay { opacity: 1; }

/* Cards with description: full dark overlay, content centered */
.work-card.has-desc .card-overlay {
  background: rgba(0,0,0,0.82);
  justify-content: center;
  padding: 2rem;
}

.card-cat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(18px, 2.2vw, 40px);
  text-transform: uppercase;
  color: #fff;
  line-height: 0.92;
  letter-spacing: -0.01em;
  margin-bottom: 0;
}
.card-desc {
  font-size: clamp(10px, 0.8vw, 13px);
  line-height: 1.7;
  color: rgba(255,255,255,0.65);
  margin-top: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 7;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* VIDEO */
.card-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
  pointer-events: none;
  border: none;
}
.work-card:hover .card-video { opacity: 1; }

/* BOTTOM BAR */
.works-bar {
  position: fixed;
  bottom: 36px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 80px;
  z-index: 20;
  pointer-events: none;
}
.works-bar span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  opacity: 0.28;
}
@media (max-width: 768px) {
  .works-bar { padding: 0 24px; }
  body { cursor: auto; }
}


/* CURSOR (desktop only) */
.cursor {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #000;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.25s ease, height 0.25s ease, background 0.25s ease;
}
.cursor.drag {
  width: 44px;
  height: 44px;
  background: rgba(0,0,0,0.12);
  border: 1px solid #000;
}
@media (max-width: 768px) { .cursor { display: none; } }
</style>
</head>
<body>

<div class="site-frame"></div>
<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav class="nav-split">
  <div class="nav-group-left">
    <a href="lab.html">Lab</a>
    <a href="lab.html#insights">Insights</a>
  </div>
  <a class="nav-logo-center" href="index.html">PARAFFINE</a>
  <div class="nav-group-right">
    <a href="work.html">Works</a>
    <a href="studio.html">Studio</a>
    <a href="studio.html">Contact</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="burger-icon" onclick="toggleMenu()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobile-menu" class="mobile-menu-overlay">
  <div class="mobile-menu-close" onclick="toggleMenu()">✕</div>
  <div class="mobile-menu-content">
    <a href="lab.html">Lab</a>
    <a href="lab.html#insights">Insights</a>
    <a href="work.html">Works</a>
    <a href="studio.html">Studio</a>
    <a href="studio.html#contact">Contact</a>
  </div>
</div>

<div id="works-scene"></div>


<div class="works-bar">
  <span data-fr="Travaux Sélectionnés" data-en="Selected Works">Selected Works</span>
  <span id="works-count"></span>
</div>

<script>
// ─── Toggle menu ───────────────────────────────────────────
function toggleMenu() {
  const m = document.getElementById('mobile-menu');
  if (m) m.classList.toggle('active');
}

// ─── Detect mode ───────────────────────────────────────────
const IS_MOBILE = () => window.innerWidth <= 768;

// ─── Cursor (desktop) ──────────────────────────────────────
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// ─── Config ────────────────────────────────────────────────
const ASPECT  = 9 / 16;
const GAP     = 16; // px between cards
const SLIDE_MS = 3000;

// Computed at init, responsive to window
let CFG = {};

function buildConfig() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const mobile = IS_MOBILE();

  if (!mobile) {
    // HORIZONTAL — width varies by X, height = width * ASPECT, cards centered vertically
    CFG = {
      mode:      'H',
      W_MAX:     Math.round(W * 0.56),
      W_MIN:     Math.round(W * 0.13),
      CENTER_Y:  Math.round(H * 0.54),
      BUFFER:    Math.round(W * 0.6),
    };
  } else {
    // VERTICAL — width varies by Y (big at top, small at bottom), cards centered horizontally
    CFG = {
      mode:      'V',
      W_MAX:     Math.round(W * 0.88),  // widest card (top)
      W_MIN:     Math.round(W * 0.46),  // narrowest card (bottom)
      CENTER_X:  Math.round(W / 2),
      BUFFER:    Math.round(H * 0.5),
      NAV_OFF:   90,                     // offset from top to clear nav
    };
  }
}

// Size at a given primary-axis screen position
// H mode: primary = X  →  returns card width
// V mode: primary = Y  →  returns card width (height = width * ASPECT)
function sizeAt(pos) {
  const range = CFG.mode === 'H'
    ? window.innerWidth
    : window.innerHeight - CFG.NAV_OFF;

  const origin = CFG.mode === 'H' ? 0 : CFG.NAV_OFF;
  const t = Math.max(0, Math.min(1, (pos - origin) / range));
  const eased = t * t; // quadratic — stronger staircase near top/left
  return Math.round(CFG.W_MAX + (CFG.W_MIN - CFG.W_MAX) * eased);
}

// ─── State ─────────────────────────────────────────────────
let PROJECTS  = [];
let scene;
let strip     = [];   // { el, timers[] }
let anchor    = 0;    // primary-axis position of first card's leading edge
let projHead  = 0;    // next project index → rightward / downward
let projTail  = 0;    // next project index → leftward / upward

let velocity  = 0;
let isDragging = false;
let dragLast   = 0;

let computedPos = []; // [{ primary, size }] for each strip item

// ─── Helpers ───────────────────────────────────────────────
function ytId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function makeCard(proj) {
  const el  = document.createElement('div');
  el.className = 'work-card';
  const timers = [];

  // Slides — YouTube URLs become thumbnails, Vimeo skipped
  const imgSrcs = (proj.images || []).map(s => {
    const id = ytId(s);
    if (id) return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    if (s.includes('vimeo.com')) return null;
    return s;
  }).filter(Boolean);

  imgSrcs.forEach((src, i) => {
    const s   = document.createElement('div');
    s.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src    = src;
    img.alt    = proj.title || '';
    img.loading = 'eager'; // always eager — lazy breaks GIF animation while opacity:0
    s.appendChild(img);
    el.appendChild(s);
  });

  // Slideshow
  const slides = el.querySelectorAll('.slide');
  if (slides.length > 1) {
    let cur = 0;
    const t = setInterval(() => {
      slides[cur].classList.remove('active');
      cur = (cur + 1) % slides.length;
      slides[cur].classList.add('active');
    }, SLIDE_MS + Math.random() * 700);
    timers.push(t);
  }

  // YouTube video on hover (desktop) — videoLink takes priority over link
  const vid = ytId(proj.videoLink) || ytId(proj.link);
  if (vid) {
    let iframe = null;
    el.addEventListener('mouseenter', () => {
      if (iframe) return;
      iframe = document.createElement('iframe');
      iframe.className = 'card-video';
      iframe.src = `https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&loop=1&playlist=${vid}&controls=0&modestbranding=1&playsinline=1`;
      iframe.allow = 'autoplay; encrypted-media';
      el.appendChild(iframe);
    });
    el.addEventListener('mouseleave', () => {
      if (iframe) { iframe.remove(); iframe = null; }
    });
  }

  // Overlay — full-card dark with description if available, bottom gradient otherwise
  const ov = document.createElement('div');
  ov.className = 'card-overlay';
  const descHtml = proj.description
    ? `<div class="card-desc">${proj.description}</div>`
    : '';
  ov.innerHTML = `<div class="card-cat">${proj.category || ''}</div><div class="card-title">${proj.title || ''}</div>${descHtml}`;
  // Full dark overlay only when description present AND no hover video (video takes priority)
  if (proj.description && !vid) el.classList.add('has-desc');
  el.appendChild(ov);

  return { el, timers };
}

// ─── Recompute positions ────────────────────────────────────
function recompute() {
  computedPos = [];
  let pos = anchor;

  strip.forEach(card => {
    const w = sizeAt(pos);
    const h = Math.round(w * ASPECT);
    computedPos.push({ primary: pos, size: w, h });

    if (CFG.mode === 'H') {
      // Horizontal: vary left + width, center vertically
      card.el.style.left      = pos + 'px';
      card.el.style.width     = w + 'px';
      card.el.style.height    = h + 'px';
      card.el.style.top       = CFG.CENTER_Y + 'px';
      card.el.style.marginTop = (-h / 2) + 'px';
      card.el.style.marginLeft = '';
    } else {
      // Vertical: vary top + height (width follows), center horizontally
      card.el.style.top       = pos + 'px';
      card.el.style.width     = w + 'px';
      card.el.style.height    = h + 'px';
      card.el.style.left      = CFG.CENTER_X + 'px';
      card.el.style.marginLeft = (-w / 2) + 'px';
      card.el.style.marginTop  = '';
    }

    pos += (CFG.mode === 'H' ? w : h) + GAP;
  });
}

// ─── Add / remove ──────────────────────────────────────────
function addForward() {
  // Add card at the forward (right/bottom) end
  const proj = PROJECTS[projHead % PROJECTS.length];
  projHead   = (projHead + 1) % PROJECTS.length;

  const { el, timers } = makeCard(proj);
  scene.appendChild(el);
  strip.push({ el, timers });
}

function addBackward() {
  // Add card at the backward (left/top) end
  projTail = (projTail - 1 + PROJECTS.length) % PROJECTS.length;
  const proj = PROJECTS[projTail];

  const { el, timers } = makeCard(proj);
  scene.prepend(el);
  strip.unshift({ el, timers });

  // Estimate new anchor: one slot before current anchor
  const estSize = CFG.W_MAX; // cards near leading edge are always max size
  const estCard = Math.round(estSize * (CFG.mode === 'H' ? 1 : ASPECT));
  anchor -= (estCard + GAP);
}

function trimForward() {
  // Remove cards gone off the forward (right/bottom) end
  while (computedPos.length > 0) {
    const last = computedPos[computedPos.length - 1];
    const edgeFar = last.primary + (CFG.mode === 'H' ? last.size : last.h);
    const limit   = (CFG.mode === 'H' ? window.innerWidth : window.innerHeight) + CFG.BUFFER;
    if (edgeFar > limit) {
      const card = strip.pop();
      card.timers.forEach(t => clearInterval(t));
      card.el.remove();
      computedPos.pop();
      projHead = (projHead - 1 + PROJECTS.length) % PROJECTS.length;
    } else break;
  }
}

function trimBackward() {
  // Remove cards gone off the backward (left/top) end
  while (computedPos.length > 0) {
    const first = computedPos[0];
    const edgeNear = first.primary + (CFG.mode === 'H' ? first.size : first.h);
    if (edgeNear < -CFG.BUFFER) {
      const card = strip.shift();
      card.timers.forEach(t => clearInterval(t));
      card.el.remove();
      computedPos.shift();
      projTail = (projTail + 1) % PROJECTS.length;
      // Update anchor to new first card's position
      if (computedPos.length > 0) anchor = computedPos[0].primary;
    } else break;
  }
}

function fillForward() {
  // Ensure cards fill up to BUFFER past the screen edge
  const maxPrimary = CFG.mode === 'H' ? window.innerWidth : window.innerHeight;
  while (true) {
    const last = computedPos[computedPos.length - 1];
    if (!last) { addForward(); recompute(); continue; }
    const edgeFar = last.primary + (CFG.mode === 'H' ? last.size : last.h);
    if (edgeFar < maxPrimary + CFG.BUFFER) {
      addForward(); recompute();
    } else break;
  }
}

function fillBackward() {
  // Ensure cards fill up to BUFFER before the screen leading edge
  while (computedPos.length === 0 || computedPos[0].primary > -CFG.BUFFER) {
    addBackward(); recompute();
  }
}

// ─── Main loop ─────────────────────────────────────────────
function loop() {
  if (Math.abs(velocity) > 0.05) {
    anchor -= velocity;
    velocity *= 0.92;
    recompute();
    trimBackward();
    trimForward();
    fillForward();
    fillBackward();
  }
  requestAnimationFrame(loop);
}

// ─── Input ─────────────────────────────────────────────────
function bindInput() {
  // Wheel — both axes on desktop, deltaY on mobile
  window.addEventListener('wheel', e => {
    e.preventDefault();
    const d = IS_MOBILE()
      ? e.deltaY
      : (Math.abs(e.deltaX) >= Math.abs(e.deltaY) ? e.deltaX : e.deltaY);
    velocity += d * 0.55;
  }, { passive: false });

  // Pointer drag (desktop)
  window.addEventListener('mousedown', e => {
    isDragging = true;
    dragLast   = e.clientX;
    cursorEl.classList.add('drag');
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    velocity += (dragLast - e.clientX) * 0.6;
    dragLast  = e.clientX;
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    cursorEl.classList.remove('drag');
  });

  // Touch — axis depends on mode
  let t0 = 0;
  window.addEventListener('touchstart', e => {
    t0 = IS_MOBILE() ? e.touches[0].clientY : e.touches[0].clientX;
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    const tNow = IS_MOBILE() ? e.touches[0].clientY : e.touches[0].clientX;
    velocity += (t0 - tNow) * 0.7;
    t0 = tNow;
  }, { passive: true });
}

// ─── Init ──────────────────────────────────────────────────
async function init() {
  scene = document.getElementById('works-scene');

  // Load projects
  try {
    const res = await fetch('site_data.json?t=' + Date.now());
    const data = await res.json();
    PROJECTS = data.works || [];
  } catch (_) {
    try {
      const res = await fetch('projects_state.json?t=' + Date.now());
      const data = await res.json();
      PROJECTS = Object.entries(data).map(([id, p]) => ({ id, ...p }));
    } catch (e) { console.error('No data source'); return; }
  }

  if (!PROJECTS.length) return;

  document.getElementById('works-count').textContent =
    String(PROJECTS.length).padStart(2, '0') + ' Works';

  buildConfig();

  // Start mid-list so it feels already in motion
  projHead = Math.floor(PROJECTS.length / 2);
  projTail = projHead;

  // Anchor: first card partially off the leading edge
  anchor = CFG.mode === 'H'
    ? -Math.round(CFG.W_MAX * 0.28)
    : CFG.NAV_OFF - Math.round(CFG.W_MAX * ASPECT * 0.15);

  // Build initial strip
  recompute();
  fillForward();
  fillBackward();

  loop();
  bindInput();
}

// ─── Resize — full rebuild ──────────────────────────────────
function rebuild() {
  // Destroy all current cards
  strip.forEach(card => {
    card.timers.forEach(t => clearInterval(t));
    card.el.remove();
  });
  strip        = [];
  computedPos  = [];

  // Recompute config for new viewport
  buildConfig();

  // Reset anchor for new dimensions (keep projHead/projTail for continuity)
  anchor = CFG.mode === 'H'
    ? -Math.round(CFG.W_MAX * 0.28)
    : CFG.NAV_OFF - Math.round(CFG.W_MAX * ASPECT * 0.15);

  // Rebuild
  recompute();
  fillForward();
  fillBackward();
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(rebuild, 150);
});

// Also handle orientation change on mobile
window.addEventListener('orientationchange', () => {
  setTimeout(rebuild, 300);
});

init();
</script>
<script src="lang.js"></script>
<script>document.addEventListener('DOMContentLoaded', initLang);</script>
