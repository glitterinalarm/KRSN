<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARAFFIN | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #050505; color: #e5e5e5; }
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, textarea { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 12px 16px; border-radius: 8px; color: white; width: 100%; transition: all 0.3s; font-family: inherit; }
        input:focus, textarea:focus { border-color: #b8c3ff; outline: none; background: rgba(255,255,255,0.05); box-shadow: 0 0 15px rgba(184, 195, 255, 0.1); }
        .preview-img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .preview-img:hover { transform: scale(1.05); border-color: #b8c3ff; }
        .category-label { color: #b8c3ff; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 10px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
            <div>
                <h1 class="text-5xl font-serif-italic mb-3">Studio Manager</h1>
                <p class="text-zinc-500 tracking-[0.3em] text-[10px] uppercase">PARAFFIN Architectural Noir — v2.0</p>
            </div>
            <div class="flex gap-4">
                <button onclick="syncSite()" id="syncBtn" class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-[#b8c3ff] hover:scale-105 transition-all shadow-xl shadow-white/5">
                    SYNC & DEPLOY
                </button>
            </div>
        </header>

        <div id="projectsList" class="space-y-12">
            <!-- Project Cards will be injected here as a vertical list -->
        </div>
        
        <footer class="mt-32 pb-20 text-center opacity-30 text-[10px] tracking-widest uppercase">
            PARAFFIN Internal Tool — 2026 Edition
        </footer>
    </div>

    <script>
        let projects = {};

        async function loadProjects() {
            const res = await fetch('/api/projects');
            projects = await res.json();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('projectsList');
            list.innerHTML = '';
            
            // Fixed order based on our known slots
            const keys = ["police", "leboncoin", "bnp", "tourisme", "westfield", "mondoffice", "casden"];
            
            keys.forEach(id => {
                const p = projects[id];
                if (!p) return;
                
                const card = document.createElement('div');
                card.className = 'glass p-8 md:p-12 rounded-2xl transition-all hover:border-white/10';
                card.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <!-- Content Side -->
                        <div class="lg:col-span-12 space-y-8">
                            <div class="flex justify-between items-center border-b border-white/5 pb-4">
                                <span class="bg-white/5 text-zinc-500 px-3 py-1 rounded text-[9px] font-bold uppercase tracking-widest">Case ID: ${id}</span>
                                <span class="category-label">${p.category}</span>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-2">
                                    <label class="text-[10px] text-zinc-500 uppercase tracking-widest">Project Title</label>
                                    <input type="text" value="${p.title}" onchange="updateProject('${id}', 'title', this.value)" class="text-2xl font-serif-italic h-14">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] text-zinc-500 uppercase tracking-widest">Category Banner</label>
                                    <input type="text" value="${p.category}" onchange="updateProject('${id}', 'category', this.value)" class="text-sm tracking-widest font-bold h-14">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] text-zinc-500 uppercase tracking-widest">Manifesto / Description</label>
                                <textarea rows="4" onchange="updateProject('${id}', 'description', this.value)" class="text-sm leading-relaxed font-light">${p.description || ''}</textarea>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] text-zinc-500 uppercase tracking-widest">Video Stream URL</label>
                                <input type="text" value="${p.link}" onchange="updateProject('${id}', 'link', this.value)" placeholder="https://youtube.com/..." class="text-xs font-mono h-12">
                            </div>

                            <div class="space-y-4">
                                <div class="flex justify-between items-center">
                                    <label class="text-[10px] text-zinc-500 uppercase tracking-widest">Media Assets (${p.images.length})</label>
                                    <button onclick="triggerUpload('${id}')" class="text-[10px] text-white bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-colors uppercase tracking-widest">+ Add Media</button>
                                </div>
                                <div class="flex flex-wrap gap-4 p-4 bg-black/20 rounded-xl border border-white/5">
                                    ${p.images.map((url, i) => `
                                        <div class="relative group/img">
                                            <div class="absolute top-0 left-0 right-0 p-1 flex justify-between bg-black/60 opacity-0 group-hover/img:opacity-100 transition-opacity z-10">
                                                <button onclick="moveImage('${id}', ${i}, -1)" class="text-[10px] hover:text-[#b8c3ff] px-1">←</button>
                                                <button onclick="removeImage('${id}', ${i})" class="text-[10px] text-red-400 font-bold hover:text-red-300">REMOVE</button>
                                                <button onclick="moveImage('${id}', ${i}, 1)" class="text-[10px] hover:text-[#b8c3ff] px-1">→</button>
                                            </div>
                                            <img src="${url}" class="preview-img">
                                            <div class="absolute bottom-1 right-2 text-[8px] text-white/40 font-bold">#${i+1}</div>
                                        </div>
                                    `).join('')}
                                    ${p.images.length === 0 ? '<div class="w-full py-10 text-center text-zinc-700 text-xs italic tracking-widest">No assets uploaded yet</div>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="file-${id}" class="hidden" onchange="handleUpload('${id}')">
                `;
                list.appendChild(card);
            });
        }

        function updateProject(id, field, value) {
            projects[id][field] = value;
            save();
        }

        function moveImage(id, index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= projects[id].images.length) return;
            
            const temp = projects[id].images[index];
            projects[id].images[index] = projects[id].images[newIndex];
            projects[id].images[newIndex] = temp;
            
            save();
            renderList();
        }

        function triggerUpload(id) {
            document.getElementById(`file-${id}`).click();
        }

        async function handleUpload(id) {
            const input = document.getElementById(`file-${id}`);
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.status === 'success') {
                projects[id].images.push(data.url);
                save();
                renderList();
            }
        }

        function removeImage(id, index) {
            if (!confirm('Remove this asset?')) return;
            projects[id].images.splice(index, 1);
            save();
            renderList();
        }

        async function save() {
            await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(projects)
            });
        }

        async function syncSite() {
            const btn = document.getElementById('syncBtn');
            const originalText = btn.innerText;
            btn.innerText = 'INITIALIZING DEPLOYMENT...';
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const res = await fetch('/api/sync', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('STATION SYNC COMPLETED: Site is live on Vercel.');
                } else {
                    alert('OPERATIONAL ERROR: ' + data.message);
                }
            } catch (e) {
                alert('COMMUNICATION FAILURE: Check server status.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }

        loadProjects();
    </script>
</body>
</html>
