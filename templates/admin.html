<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARAFFIN | Admin Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0e0e0e; color: #e5e2e1; }
        .font-serif-italic { font-family: 'Newsreader', serif; font-style: italic; }
        .glass { background: rgba(32, 31, 31, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(184, 195, 255, 0.1); }
        .primary-text { color: #b8c3ff; }
        .primary-bg { background-color: #b8c3ff; }
        .input-field { background: transparent; border-bottom: 1px solid #434656; outline: none; transition: border-color 0.3s; }
        .input-field:focus { border-color: #b8c3ff; }
    </style>
</head>
<body class="p-10 mb-20">
    <nav class="flex justify-between items-center mb-16">
        <div>
            <span class="text-sm font-black tracking-[0.3em] uppercase">PARAFFIN | Admin Console</span>
        </div>
        <button onclick="publishSite()" id="publish-btn" class="primary-bg text-black px-8 py-3 text-xs font-bold uppercase tracking-widest hover:opacity-80 transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">rocket_launch</span>
            Publish to Vercel
        </button>
    </nav>

    <main class="max-w-5xl mx-auto">
        <header class="mb-12">
            <h1 class="text-6xl font-serif-italic mb-4">Project Media Management</h1>
            <p class="text-gray-500 max-w-xl text-sm">Define the hover slideshow sequences for your Work page. Changes are saved locally and must be published to go live.</p>
        </header>

        <div id="projects-container" class="grid grid-cols-1 gap-8">
            <!-- Project Cards will be injected here -->
        </div>

        <div class="mt-12 flex justify-center">
            <button onclick="addProject()" class="border border-dashed border-gray-600 px-10 py-6 text-gray-500 hover:text-white hover:border-white transition-all text-xs uppercase tracking-widest flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">add</span>
                Add New Project Row
            </button>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 glass px-6 py-4 text-sm tracking-widest uppercase hidden"></div>

    <script>
        let projectsData = {};

        async function loadProjects() {
            const res = await fetch('/api/projects');
            projectsData = await res.json();
            renderProjects();
        }

        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '';

            Object.keys(projectsData).forEach(name => {
                const project = projectsData[name];
                const card = document.createElement('div');
                card.className = 'glass p-8 relative group';
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="md:w-1/3">
                            <input type="text" value="${name}" onchange="renameProject('${name}', this.value)" class="text-2xl font-serif-italic input-field w-full mb-4" placeholder="Project Name">
                            
                            <div class="mt-8">
                                <h4 class="text-[10px] uppercase text-primary tracking-widest mb-2">Project Link (Youtube / Case Study)</h4>
                                <input type="text" value="${project.link || ''}" onchange="updateLink('${name}', this.value)" class="text-xs font-mono input-field w-full py-2" placeholder="https://youtube.com/...">
                            </div>

                            <button onclick="deleteProject('${name}')" class="mt-8 text-red-900 hover:text-red-500 text-[10px] uppercase tracking-widest transition-colors">Delete Project</button>
                        </div>
                        <div class="md:w-2/3">
                            <h4 class="text-[10px] uppercase text-gray-500 tracking-widest mb-4">Slideshow Images (URLs)</h4>
                            <div id="urls-${name.replace(/\\s+/g, '-')}" class="space-y-3">
                                ${(project.images || []).map((url, i) => `
                                    <div class="flex gap-2">
                                        <input type="text" value="${url}" onchange="updateUrl('${name}', ${i}, this.value)" class="flex-grow text-xs font-mono input-field py-2" placeholder="https://...">
                                        <button onclick="removeUrl('${name}', ${i})" class="text-gray-600 hover:text-white transition-colors material-symbols-outlined text-sm">remove</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-4 flex gap-6">
                                <button onclick="addUrl('${name}')" class="text-[10px] text-primary hover:underline transition-all uppercase tracking-widest flex items-center gap-2">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                    Add URL
                                </button>
                                <label class="text-[10px] text-gray-400 hover:text-white transition-all uppercase tracking-widest flex items-center gap-2 cursor-pointer">
                                    <span class="material-symbols-outlined text-sm">upload_file</span>
                                    Upload Image
                                    <input type="file" class="hidden" accept="image/*" onchange="handleUpload('${name}', this)">
                                </label>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function handleUpload(name, input) {
            if (!input.files || !input.files[0]) return;
            
            showToast('Uploading image...');
            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('project_name', name);

            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (data.status === 'success') {
                projectsData[name].images.push(data.url);
                renderProjects();
                save();
                showToast('Image uploaded and added!');
            } else {
                showToast('Upload failed: ' + data.message);
            }
        }

        function updateLink(name, value) {
            projectsData[name].link = value;
            save();
        }

        function updateUrl(name, index, value) {
            projectsData[name].images[index] = value;
            save();
        }

        function addUrl(name) {
            projectsData[name].images.push('');
            renderProjects();
            save();
        }

        function removeUrl(name, index) {
            projectsData[name].images.splice(index, 1);
            renderProjects();
            save();
        }

        function addProject() {
            const name = 'New Project ' + Date.now();
            projectsData[name] = { images: [], link: '' };
            renderProjects();
            save();
        }

        function deleteProject(name) {
            if(confirm('Delete project ' + name + '?')) {
                delete projectsData[name];
                renderProjects();
                save();
            }
        }

        async function save() {
            await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(projectsData)
            });
            showToast('Changes saved locally');
        }

        async function publishSite() {
            const btn = document.getElementById('publish-btn');
            btn.innerHTML = 'Publishing...';
            btn.disabled = true;

            const res = await fetch('/api/sync', { method: 'POST' });
            const data = await res.json();
            
            showToast(data.message);
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-sm">rocket_launch</span> Publish to Vercel';
                btn.disabled = false;
            }, 3000);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        loadProjects();
    </script>
</body>
</html>
