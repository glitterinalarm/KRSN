<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lab & Insights — PARAFFINE</title>
<meta name="description" content="PARAFFINE Lab — R&D experiments and creative insights from the Kérosene feed."/>
<link href="monolith.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<script src="lang.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fff;
  color: #000;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ─── NAV ─────────────────────────────────────────────────── */
.nav-split { color: #000; }
.nav-split a { color: #000; text-decoration: none; transition: opacity 0.3s; }
.nav-split a:hover { opacity: 0.45; }
.nav-logo-center { color: #000; }

/* ─── LAYOUT ──────────────────────────────────────────────── */
.lab-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  width: 100vw;
  padding-top: 100px; /* nav clearance */
}

/* Vertical divider */
.lab-layout::before {
  content: '';
  position: fixed;
  top: 0;
  left: 50%;
  width: 1px;
  height: 100%;
  background: rgba(0,0,0,0.08);
  z-index: 5;
  pointer-events: none;
}

/* ─── COLUMN ──────────────────────────────────────────────── */
.col {
  height: calc(100vh - 100px);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 48px 56px 80px;
  scrollbar-width: none;
  scroll-behavior: smooth;
}
.col::-webkit-scrollbar { display: none; }

/* ─── SECTION HEADER ──────────────────────────────────────── */
.col-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 48px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}

.col-header::before {
  content: '—';
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  opacity: 0.4;
}

.col-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  opacity: 0.45;
}

.col-sublabel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.25;
  margin-left: auto;
}

.col-description {
  font-size: 12px;
  line-height: 1.8;
  color: #555;
  max-width: 420px;
  margin-bottom: 48px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

/* ─── LAB ITEMS (LEFT) ────────────────────────────────────── */
.lab-item {
  margin-bottom: 64px;
  cursor: pointer;
}

.lab-item:last-child { margin-bottom: 0; }

.lab-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #f0f0f0;
  margin-bottom: 20px;
  position: relative;
}

.lab-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  filter: grayscale(20%);
}

.lab-item:hover .lab-thumb img {
  transform: scale(1.04);
  filter: grayscale(0%);
}

.lab-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-bottom: 8px;
}

.lab-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(24px, 2.8vw, 42px);
  text-transform: uppercase;
  line-height: 0.92;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  transition: opacity 0.3s;
}

.lab-item:hover .lab-title { opacity: 0.65; }

.lab-desc {
  font-size: 12px;
  line-height: 1.7;
  color: #666;
  max-width: 380px;
  margin-bottom: 16px;
}

.lab-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-decoration: none;
  color: #000;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  padding-bottom: 2px;
  opacity: 0;
  transition: opacity 0.3s;
}

.lab-item:hover .lab-link { opacity: 1; }

/* ─── INSIGHTS ITEMS (RIGHT) — uniform cards ─────────────── */
.insight-card {
  margin-bottom: 48px;
  cursor: pointer;
  text-decoration: none;
  color: #000;
  display: block;
}

.insight-card:last-child { margin-bottom: 0; }

.insight-card-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #f0f0f0;
  margin-bottom: 16px;
}

.insight-card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  filter: grayscale(10%);
}

.insight-card:hover .insight-card-thumb img {
  transform: scale(1.03);
  filter: grayscale(0%);
}

.insight-cat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  opacity: 0.4;
  margin-bottom: 6px;
}

.insight-card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(20px, 2.4vw, 36px);
  text-transform: uppercase;
  line-height: 0.92;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  transition: opacity 0.3s;
}

.insight-card:hover .insight-card-title { opacity: 0.6; }

.insight-desc {
  font-size: 10px;
  opacity: 0.5;
  line-height: 1.6;
  letter-spacing: 0.01em;
  max-width: 340px;
}

/* no fade edges */

/* ─── MOBILE ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  body { overflow: hidden; }

  .lab-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 80px); /* nav */
    padding-top: 80px;
    overflow: hidden;
  }

  /* Remove vertical divider on mobile */
  .lab-layout::before { display: none; }

  /* Horizontal divider between two halves */
  .lab-layout::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(0,0,0,0.1);
    z-index: 5;
    pointer-events: none;
  }

  /* Each half takes 50% of viewport height */
  .col {
    height: 50%;
    max-height: 50%;
    overflow: hidden;
    padding: 0;
  }

  /* Horizontal scroll inner strip */
  .col-inner {
    display: flex;
    flex-direction: row;
    height: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    padding: 16px 24px 16px 24px;
    gap: 16px;
  }
  .col-inner::-webkit-scrollbar { display: none; }

  /* Mobile cards in strip */
  .mob-card {
    flex-shrink: 0;
    width: 65vw;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .mob-card:first-child { margin-left: 0; }

  .mob-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #eee;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .mob-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.45;
    margin-bottom: 4px;
  }

  .mob-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: -0.01em;
  }

  /* Hide desktop-only col header on mobile */
  .col-header { display: none; }

  /* Show mobile section label */
  .mob-section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.4;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
  }

  .col-right .mob-card { width: 60vw; }

  /* Hide desktop-only elements on mobile */
  .desktop-only { display: none !important; }
  .mobile-only { display: flex !important; }
}

/* Mobile-only elements hidden on desktop */
.mobile-only { display: none; }
</style>
</head>
<body>

<div class="site-frame"></div>

<!-- NAV -->
<nav class="nav-split">
  <div class="nav-group-left">
    <a href="lab.html">Lab</a>
    <a href="lab.html#insights">Insights</a>
  </div>
  <a class="nav-logo-center" href="index.html">PARAFFINE</a>
  <div class="nav-group-right">
    <a href="work.html">Works</a>
    <a href="studio.html">Studio</a>
    <a href="studio.html">Contact</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="burger-icon" onclick="toggleMenu()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobile-menu" class="mobile-menu-overlay">
  <div class="mobile-menu-close" onclick="toggleMenu()">✕</div>
  <div class="mobile-menu-content">
    <a href="lab.html">Lab</a>
    <a href="lab.html#insights">Insights</a>
    <a href="work.html">Works</a>
    <a href="studio.html">Studio</a>
    <a href="studio.html#contact">Contact</a>
  </div>
</div>

<!-- SPLIT LAYOUT -->
<main class="lab-layout">

  <!-- LEFT: LAB R&D -->
  <div class="col col-left" id="lab">
    <div class="col-header">
      <span class="col-label">Lab / R&amp;D</span>
      <span class="col-sublabel">Experiments</span>
    </div>
    <!-- Mobile section label -->
    <div class="mob-section-label mobile-only">— Lab / R&amp;D</div>
    <!-- Intro description -->
    <p class="col-description desktop-only" id="lab-description"></p>
    <!-- Desktop content injected by JS -->
    <div class="lab-feed desktop-only" id="lab-feed-desktop"></div>
    <!-- Mobile horizontal strip -->
    <div class="col-inner mobile-only" id="lab-feed-mobile"></div>
  </div>

  <!-- RIGHT: INSIGHTS FEED -->
  <div class="col col-right" id="insights">
    <div class="col-header">
      <span class="col-label">Insights / Kérosene</span>
      <span class="col-sublabel">Bidirectionnal Feed</span>
    </div>
    <!-- Mobile section label -->
    <div class="mob-section-label mobile-only">— Insights / Kérosene</div>
    <!-- Desktop content injected by JS -->
    <div class="insights-feed desktop-only" id="insights-feed-desktop"></div>
    <!-- Mobile horizontal strip -->
    <div class="col-inner mobile-only" id="insights-feed-mobile"></div>
  </div>

</main>

<script>
function toggleMenu() {
  const m = document.getElementById('mobile-menu');
  if (m) m.classList.toggle('active');
}

const IS_MOBILE = () => window.innerWidth <= 768;

// ─── Load & Render ───────────────────────────────────────────
async function init() {
  let data = null;
  try {
    const res = await fetch('site_data.json?t=' + Date.now());
    data = await res.json();
  } catch (e) {
    console.error('Failed to load site_data.json', e);
    return;
  }

  const descEl = document.getElementById('lab-description');
  if (descEl && data.labDescription) {
    if (typeof data.labDescription === 'object') {
      descEl.dataset.fr = data.labDescription.fr || '';
      descEl.dataset.en = data.labDescription.en || '';
    }
    descEl.textContent = t(data.labDescription);
  }

  renderLab(data.lab || []);

  // Fetch live Kérosène editorial and prepend with priority
  let keroseneItems = [];
  try {
    const keroRes = await fetch('https://2vfzwmqqws8h2xfv.public.blob.vercel-storage.com/editorial/daily.json?t=' + Date.now());
    if (keroRes.ok) {
      const keroData = await keroRes.json();
      if (Array.isArray(keroData.articles)) {
        keroseneItems = keroData.articles
          .filter(a => a.imageUrl && !a.imageUrl.includes('unsplash.com'))
          .map(a => ({
            image: a.imageUrl,
            title: 'KÉROSÈNE // ' + (a.title || ''),
            description: (a.insight || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 140),
            link: 'https://veille-creative.vercel.app/article/' + encodeURIComponent(a.id),
          }));
      }
    }
  } catch (e) {
    console.warn('Kérosène feed unavailable', e);
  }

  renderInsights([...keroseneItems, ...(data.insights || [])]);
}

// ─── LAB ─────────────────────────────────────────────────────
function renderLab(items) {
  const desktop = document.getElementById('lab-feed-desktop');
  const mobile  = document.getElementById('lab-feed-mobile');

  items.forEach(item => {
    const thumb = (item.images && item.images[0]) ? item.images[0] : (item.image || '');

    // Desktop card
    const d = document.createElement('div');
    d.className = 'lab-item';
    d.onclick = () => item.link && window.open(item.link, '_blank');
    d.innerHTML = `
      <div class="lab-thumb">
        ${thumb ? `<img src="${thumb}" alt="${item.title || ''}" loading="lazy"/>` : ''}
      </div>
      <div class="lab-meta">${item.meta || ''}</div>
      <div class="lab-title">${item.title || ''}</div>
      ${item.description ? `<p class="lab-desc">${t(item.description)}</p>` : ''}
      ${item.link ? `<a class="lab-link" href="${item.link}" target="_blank" rel="noopener">Visit →</a>` : ''}
    `;
    desktop.appendChild(d);

    // Mobile card
    const m = document.createElement('div');
    m.className = 'mob-card';
    m.onclick = () => item.link && window.open(item.link, '_blank');
    m.innerHTML = `
      ${thumb ? `<img class="mob-thumb" src="${thumb}" alt="${item.title || ''}" loading="lazy"/>` : `<div class="mob-thumb"></div>`}
      <div class="mob-meta">${item.meta || ''}</div>
      <div class="mob-title">${item.title || ''}</div>
    `;
    mobile.appendChild(m);
  });
}

// ─── INSIGHTS — all uniform cards ───────────────────────────
function renderInsights(items) {
  const desktop = document.getElementById('insights-feed-desktop');
  const mobile  = document.getElementById('insights-feed-mobile');

  if (!items.length) return;

  // Desktop: all items same format — 16/9 thumb + cat + title + desc
  items.forEach((item, idx) => {
    const a = document.createElement('a');
    a.className = 'insight-card';
    a.href = item.link || '#';
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <div class="insight-card-thumb">
        ${item.image ? `<img src="${item.image}" alt="${item.title || ''}" loading="${idx === 0 ? 'eager' : 'lazy'}"/>` : ''}
      </div>
      <div class="insight-cat">${extractCat(item.title)}</div>
      <div class="insight-card-title">${cleanTitle(item.title)}</div>
      ${item.description ? `<div class="insight-desc">${item.description}</div>` : ''}
    `;
    desktop.appendChild(a);
  });

  // Mobile: same cards horizontal strip
  items.forEach(item => {
    const m = document.createElement('div');
    m.className = 'mob-card';
    m.onclick = () => item.link && window.open(item.link, '_blank');
    m.innerHTML = `
      ${item.image ? `<img class="mob-thumb" src="${item.image}" alt="${item.title || ''}" loading="lazy"/>` : `<div class="mob-thumb"></div>`}
      <div class="mob-meta">${extractCat(item.title)}</div>
      <div class="mob-title">${cleanTitle(item.title)}</div>
    `;
    mobile.appendChild(m);
  });
}

// ─── Helpers ─────────────────────────────────────────────────
function extractCat(title) {
  if (!title) return '';
  const parts = title.split('//');
  return parts.length > 1 ? parts[0].trim() : '';
}

function cleanTitle(title) {
  if (!title) return '';
  const parts = title.split('//');
  return parts.length > 1 ? parts[1].trim() : title;
}

document.addEventListener('DOMContentLoaded', () => {
  initLang();
  init().then(() => applyLang());
});
</script>
</body>
</html>
